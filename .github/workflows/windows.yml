name: Windows Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v7.0.0
        with:
          submodules: recursive

      - uses: actions/setup-python@v6.2.0
        with:
          python-version: '3.11'
          check-latest: true
          cache: pip
          cache-dependency-path: requirements.txt

      - uses: lukka/get-cmake@latest

      # pyMSVC locates and activates the MSVC toolchain so Cython and CMake
      # can find the compiler.  Must be installed before setup.py runs.
      - name: Install pyMSVC
        run: pip install git+https://github.com/kdschlosser/python_msvc@master

      - name: Install build tools
        run: |
          python -m pip install "pip==26.0.1"
          pip install "setuptools==62.0.0" "Cython==3.2.4" "wheel==0.46.3" "pyinstaller==6.19.0"

      - name: Install runtime dependencies
        run: |
          pip install "PyOpenGL==3.1.10" "PyOpenGL-accelerate==3.1.10"
          pip install "requests==2.33.1" "numpy==2.2.6" "pillow==12.2.0" "mpmath==1.3.0"
          pip install "lib3mf==2.4.1.post1" "ezdxf==1.4.3" "scipy==1.17.1" "sympy==1.14.0"
          pip install "pyfqmr==0.4.0" "meshio==5.3.5" "cadquery-ocp==7.8.1.1" "build123d==0.10.0"
          pip install "keyring==25.7.0" "pyopencl==2026.1.2" "pandas==3.0.3"
          pip install "nvidia-ml-py==13.610.43" "amdsmi==7.0.2"
          pip install "PySide6==6.11.1"
          # mysql-connector-python is not bundled (see build.py --exclude-module),
          # but must be importable here so PyInstaller's --collect-all=harness_designer
          # can analyze harness_designer.database.db_connectors.mysql_connector without
          # raising ModuleNotFoundError and silently dropping unrelated sibling packages.
          pip install "mysql-connector-python==9.5.0"

      - name: Build (Cython + PyInstaller + dependency installer)
        env:
          PYTHONPATH: ${{ github.workspace }}
        shell: bash
        run: |
          set -o pipefail
          python setup.py install --installer 2>&1 | tee build.log

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: build-log-windows.zip
          path: build.log

      - name: Upload app artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: harness_designer-windows.zip
          path: builder/scripts/dist/harness_designer/
          if-no-files-found: error

      - name: Upload dependency installer artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: harness_designer-windows-dep-installer.zip
          path: builder/scripts/dist/dep_installer.exe
          if-no-files-found: error

      - name: Upload Windows installer artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: harness_designer-windows-installer.zip
          path: dist/windows/
          if-no-files-found: error
