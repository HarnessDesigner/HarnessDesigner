name: Windows Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11.14'
          cache: pip
          cache-dependency-path: requirements.txt

      - uses: lukka/get-cmake@latest

      # pyMSVC locates and activates the MSVC toolchain so Cython and CMake
      # can find the compiler.  Must be installed before setup.py runs.
      - name: Install pyMSVC
        run: pip install git+https://github.com/kdschlosser/python_msvc@master

      - name: Install build tools
        run: |
          python -m pip install "pip==26.0.1"
          pip install "setuptools==62.0.0" "Cython==3.2.4" "wheel==0.46.3" "pyinstaller==6.19.0"

      - name: Install runtime dependencies
        run: |
          pip install "PyOpenGL==3.1.10" "PyOpenGL-accelerate==3.1.10"
          pip install "requests==2.33.1" "numpy==2.2.6" "pillow==12.2.0" "mpmath==1.3.0"
          pip install "lib3mf==2.4.1.post1" "ezdxf==1.4.3" "scipy==1.17.1" "sympy==1.14.0"
          pip install "pyfqmr==0.4.0" "meshio==5.3.5" "cadquery-ocp==7.9.3.1" "build123d==0.10.0"
          pip install "keyring==25.7.0" "pyopencl==2026.1.2" "pandas==3.0.3"
          pip install "nvidia-ml-py==13.610.43" "amdsmi==7.0.2"
          pip install "PySide6==6.11.1"

      - name: Build (Cython + PyInstaller + dependency installer)
        run: python setup.py install --installer

      - name: Upload app artifact
        uses: actions/upload-artifact@v4
        with:
          name: harness_designer-windows
          path: builder/scripts/dist/harness_designer/
          if-no-files-found: error

      - name: Upload dependency installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: harness_designer-windows-dep-installer
          path: builder/scripts/dist/installer/
          if-no-files-found: error
