# This workflow will install Python dependencies, run tests and lint with a variety of Python versions
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Python package

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        python-version: []

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v3
      with:
        python-version: "3.11.14"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install Cython, setuptoolspyinstaller==6.19.0 PyOpenGL-accelerate==3.1.10 PyOpenGL==3.1.10 PyMuPDF==1.26.7 requests==2.32.5
        pip install mysql-connector-python==9.5.0 numpy==2.2.6 pillow==12.1.0 mpmath==1.3.0 lib3mf==2.4.1.post1 ezdxf==1.4.3 scipy==1.17.0
        pip install sympy==1.14.0 wxPython==4.2.4 opencv-python==4.12.0.88 pyfqmr==0.5.0 meshio==5.3.5 ifcopenshell==0.8.4.post1
        pip install cadquery-ocp==7.8.1.1 build123d==0.10.0

    - name: Build
      run: python setup.py install --installer
        
        
