name: macOS Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    name: Build (macOS ${{ matrix.arch }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-13   # Intel x86_64
            arch: x86_64
          - os: macos-14   # Apple Silicon arm64
            arch: arm64

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: setup.py

      - uses: lukka/get-cmake@latest

      - name: Install Ninja
        run: brew install ninja

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install Cython pyinstaller

      - name: Install runtime dependencies
        run: |
          pip install \
            PyOpenGL \
            numpy pillow scipy sympy \
            ezdxf matplotlib IPython \
            requests keyring \
            opencv-python pyfqmr meshio \
            pyopencl build123d vtk \
            rich lark isodate webcolors \
            mdurl markdown-it-py \
            shapely svgwrite svgpathtools svgelements \
            trianglesolver mpmath \
            PySide6

      # OpenGL_accelerate is unreliable on Apple Silicon — skip it on arm64.
      - name: Install OpenGL accelerate (Intel only)
        if: matrix.arch == 'x86_64'
        run: pip install PyOpenGL-accelerate

      - name: Build (Cython + PyInstaller + dependency installer)
        run: python setup.py install --installer

      - name: Upload app artifact
        uses: actions/upload-artifact@v4
        with:
          name: harness_designer-macos-${{ matrix.arch }}
          path: builder/scripts/dist/harness_designer.app/
          if-no-files-found: error

      - name: Upload dependency installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: harness_designer-macos-${{ matrix.arch }}-dep-installer
          path: builder/scripts/dist/installer.app/
          if-no-files-found: error
