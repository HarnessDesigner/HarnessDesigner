name: macOS Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    name: Build (macOS ${{ matrix.arch }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-13   # Intel x86_64
            arch: x86_64
          - os: macos-14   # Apple Silicon arm64
            arch: arm64

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: astral-sh/setup-python@v1
        with:
          python-version: '3.11.14'
          cache: pip
          cache-dependency-path: requirements.txt

      - uses: lukka/get-cmake@latest

      - name: Install Ninja
        run: brew install ninja

      - name: Install build tools
        run: |
          python -m pip install "pip==26.0.1"
          pip install "setuptools==62.0.0" "Cython==3.2.4" "wheel==0.46.3" "pyinstaller==6.19.0"

      - name: Install runtime dependencies
        run: |
          pip install \
            "PyOpenGL==3.1.10" \
            "requests==2.33.1" \
            "numpy==2.2.6" \
            "pillow==12.2.0" \
            "mpmath==1.3.0" \
            "lib3mf==2.4.1.post1" \
            "ezdxf==1.4.3" \
            "scipy==1.17.1" \
            "sympy==1.14.0" \
            "pyfqmr==0.4.0" \
            "meshio==5.3.5" \
            "cadquery-ocp==7.9.3.1" \
            "build123d==0.10.0" \
            "keyring==25.7.0" \
            "pyopencl==2026.1.2" \
            "pandas==3.0.3" \
            "apple_smi==0.1.4" \
            "PySide6==6.11.1"

      # PyOpenGL-accelerate works on macOS but only on Intel — skip on Apple Silicon.
      - name: Install PyOpenGL-accelerate (Intel only)
        if: matrix.arch == 'x86_64'
        run: pip install "PyOpenGL-accelerate==3.1.10"

      - name: Build (Cython + PyInstaller + dependency installer)
        run: python setup.py install --installer

      - name: Upload app artifact
        uses: actions/upload-artifact@v4
        with:
          name: harness_designer-macos-${{ matrix.arch }}
          path: builder/scripts/dist/harness_designer.app/
          if-no-files-found: error

      - name: Upload dependency installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: harness_designer-macos-${{ matrix.arch }}-dep-installer
          path: builder/scripts/dist/installer.app/
          if-no-files-found: error
