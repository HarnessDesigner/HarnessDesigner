name: Linux Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: setup.py

      - uses: lukka/get-cmake@latest

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ninja-build \
            libcurl4-openssl-dev \
            libexpat1-dev \
            libgl1-mesa-dev \
            libglu1-mesa-dev \
            freeglut3-dev \
            libjpeg-dev \
            libtiff-dev \
            libunwind-dev \
            libxcb-cursor0 \
            libxkbcommon-x11-0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-shape0 \
            libxcb-xinerama0 \
            libxcb-xfixes0 \
            libegl1-mesa-dev \
            libdbus-1-3 \
            opencl-headers \
            ocl-icd-opencl-dev \
            ocl-icd-libopencl1

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install Cython pyinstaller

      - name: Install runtime dependencies
        run: |
          pip install \
            PyOpenGL PyOpenGL-accelerate \
            numpy pillow scipy sympy \
            ezdxf matplotlib IPython \
            requests keyring \
            opencv-python pyfqmr meshio \
            pyopencl build123d vtk \
            rich lark isodate webcolors \
            mdurl markdown-it-py \
            shapely svgwrite svgpathtools svgelements \
            trianglesolver mpmath \
            PySide6

      - name: Build (Cython + PyInstaller + dependency installer)
        run: python setup.py install --installer

      - name: Upload app artifact
        uses: actions/upload-artifact@v4
        with:
          name: harness_designer-linux
          path: builder/scripts/dist/harness_designer/
          if-no-files-found: error

      - name: Upload dependency installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: harness_designer-linux-dep-installer
          path: builder/scripts/dist/installer
          if-no-files-found: error
