name: Linux Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v7.0.0
        with:
          submodules: recursive

      - uses: actions/setup-python@v6.2.0
        with:
          python-version: '3.11'
          check-latest: true
          cache: pip
          cache-dependency-path: requirements.txt

      - uses: lukka/get-cmake@latest

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ninja-build \
            libcurl4-openssl-dev \
            libexpat1-dev \
            libgl1-mesa-dev \
            libglu1-mesa-dev \
            freeglut3-dev \
            libjpeg-dev \
            libtiff-dev \
            libunwind-dev \
            libxcb-cursor0 \
            libxkbcommon-x11-0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-shape0 \
            libxcb-xinerama0 \
            libxcb-xfixes0 \
            libegl1-mesa-dev \
            libdbus-1-3 \
            opencl-headers \
            ocl-icd-opencl-dev \
            ocl-icd-libopencl1

      - name: Install build tools
        run: |
          python -m pip install "pip==26.0.1"
          pip install "setuptools==62.0.0" "Cython==3.2.4" "wheel==0.46.3" "pyinstaller==6.19.0"

      - name: Install runtime dependencies
        run: |
          # mysql-connector-python is not bundled (see build.py --exclude-module), but
          # must be importable here so PyInstaller's --collect-all=harness_designer can
          # analyze harness_designer.database.db_connectors.mysql_connector without
          # raising ModuleNotFoundError and silently dropping unrelated sibling packages.
          pip install \
            "PyOpenGL==3.1.10" \
            "PyOpenGL-accelerate==3.1.10" \
            "requests==2.33.1" \
            "numpy==2.2.6" \
            "pillow==12.2.0" \
            "mpmath==1.3.0" \
            "lib3mf==2.4.1.post1" \
            "ezdxf==1.4.3" \
            "scipy==1.17.1" \
            "sympy==1.14.0" \
            "pyfqmr==0.4.0" \
            "meshio==5.3.5" \
            "cadquery-ocp==7.8.1.1" \
            "build123d==0.10.0" \
            "keyring==25.7.0" \
            "pyopencl==2026.1.2" \
            "pandas==3.0.3" \
            "nvidia-ml-py==13.610.43" \
            "amdsmi==7.0.2" \
            "PySide6==6.11.1" \
            "mysql-connector-python==9.5.0"

      - name: Build native dependencies (assimp + pyassimp)
        env:
          PYTHONPATH: ${{ github.workspace }}
        shell: bash
        run: |
          set -o pipefail
          python -m builder.build_native_deps 2>&1 | tee build.log

      - name: Build harness_designer wheel
        shell: bash
        run: |
          set -o pipefail
          pip install -v . 2>&1 | tee -a build.log

      - name: Build installer
        env:
          PYTHONPATH: ${{ github.workspace }}
        shell: bash
        run: |
          set -o pipefail
          python -m builder 2>&1 | tee -a build.log
          python -m builder.installer 2>&1 | tee -a build.log

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: build-log-linux.zip
          path: build.log

      - name: Upload generated C sources
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: harness_designer-linux-generated-c.zip
          path: build/c/

      - name: Upload Linux archive artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: harness_designer-linux.zip
          path: dist/linux/
          if-no-files-found: error
